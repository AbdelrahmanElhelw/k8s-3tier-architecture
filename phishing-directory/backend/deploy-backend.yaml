apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        image: abdelrahmanelhelw/k8s-project-backend:v1 
        ports:
          - containerPort: 5000
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: project-cm
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            configMapKeyRef:  
              name: project-cm
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef: 
              name: mysql-secret
              key: DB_PASSWORD    
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:  
              name: project-cm
              key: DB_NAME
              
                  
      tolerations:
      - key: "project"
        operator: "Equal"
        value: "phishing"
        effect: "NoSchedule"

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: "project"
                operator: "In"
                values:
                - "phishing"
